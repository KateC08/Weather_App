<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Application</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="dashboard-wrapper">
    <header class="app-header">
        <div class="location">
            <i data-lucide="map-pin"></i>
            <span>Manolo Fortich, Northern Mindanao</span>
        </div>
        <div id="date-display">Thursday, March 19</div>
    </header>

    <main class="bento-grid">
        <div class="card hero-card" id="temp-card">
            <div class="card-label">Current Temperature</div>
            <div class="main-display">
                <span class="value" id="temp">--</span><span class="unit">°C</span>
                <div class="feels-like">Feels like <span id="feels-like">--</span>°C</div>
            </div>
            <div class="weather-desc" id="temp-desc">Fetching data...</div>
            <hr>
            <div class="quick-stats">
                <span><i data-lucide="thermometer"></i> Sensor: DHT11</span>
                <span><i data-lucide="zap"></i> Mode: Live</span>
            </div>
        </div>

        <div class="card insight-card" id="hum-card">
            <div class="card-label">Humidity</div>
            <div class="value-small"><span id="hum">--</span>%</div>
            <div class="status-bar"><div class="progress" id="hum-progress"></div></div>
            <p class="recommendation" id="hum-advice">Waiting for update...</p>
        </div>

        <div class="card safety-card">
            <div class="card-label">Environment Insight</div>
            <div id="safety-icon"><i data-lucide="activity"></i></div>
            <div class="safety-text" id="safety-msg">Analyzing conditions...</div>
        </div>
    </main>

    <footer class="last-updated">
        <span class="update-dot"></span> <span id="time">Last update: --</span>
    </footer>
</div>

<script src="script.js"></script>
<script>
    // This line initializes the icons
    lucide.createIcons();
</script>
</body>
</html>
